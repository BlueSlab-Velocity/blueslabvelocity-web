name: deploy

on:
  push:
    branches: [main]
  #pull_request:
  ##  branches: [main]

permissions:
  contents: read
  pull-requests: write

# Opt into the Node.js 24 runtime for JavaScript-based actions ahead of the
# 2 June 2026 default switch. Suppresses the Node 20 deprecation warning
# emitted by actions/checkout and actions/setup-node.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'dist'
          api_location: 'api'
          skip_app_build: true   # we built it ourselves above